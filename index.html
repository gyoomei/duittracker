<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuitTracker — Catat Keuangan Bulanan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a25;
    --border: #252535;
    --text: #e4e4f0;
    --muted: #8888a0;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.1);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.1);
    --purple: #a855f7;
    --yellow: #eab308;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 20px }

  /* Header */
  header {
    text-align: center;
    padding: 32px 0 24px;
  }
  header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px }
  header h1 span { color: var(--green) }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px }

  /* Month selector */
  .month-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-bottom: 24px;
  }
  .month-bar button {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .month-bar button:hover { background: var(--card); border-color: var(--green) }
  .month-bar .month-label { font-size: 1.1rem; font-weight: 600; min-width: 140px; text-align: center }

  /* Summary cards */
  .summary {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card); border-radius: var(--radius);
    padding: 18px 16px; border: 1px solid var(--border);
  }
  .summary-card .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px }
  .summary-card .amount { font-size: 1.5rem; font-weight: 700; margin-top: 4px }
  .summary-card.income .amount { color: var(--green) }
  .summary-card.expense .amount { color: var(--red) }
  .summary-card.net .amount { color: var(--text) }
  .summary-card.net.positive .amount { color: var(--green) }
  .summary-card.net.negative .amount { color: var(--red) }

  /* Add form */
  .form-section {
    background: var(--card); border-radius: var(--radius);
    padding: 20px; border: 1px solid var(--border); margin-bottom: 24px;
  }
  .form-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px }
  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr 100px 100px auto;
    gap: 10px; align-items: end;
  }
  .form-grid input, .form-grid select {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 0.9rem; outline: none;
    transition: border-color 0.15s;
  }
  .form-grid input:focus, .form-grid select:focus { border-color: var(--green) }
  .form-grid input::placeholder { color: var(--muted) }
  select { cursor: pointer }
  .btn {
    padding: 10px 18px; border-radius: 10px; border: none;
    font-weight: 600; font-size: 0.9rem; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-green { background: var(--green); color: #000 }
  .btn-green:hover { filter: brightness(1.15) }
  .btn-red { background: var(--red); color: #fff }
  .btn-red:hover { filter: brightness(1.15) }
  .btn-outline {
    background: transparent; border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--text) }

  /* Transactions list */
  .tx-section { margin-bottom: 24px }
  .tx-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px }
  .tx-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; background: var(--card);
    border-radius: 10px; border: 1px solid var(--border);
    margin-bottom: 8px; transition: all 0.15s;
  }
  .tx-item:hover { border-color: var(--muted) }
  .tx-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .tx-icon.income-icon { background: var(--green-bg); color: var(--green) }
  .tx-icon.expense-icon { background: var(--red-bg); color: var(--red) }
  .tx-info { flex: 1; min-width: 0 }
  .tx-info .desc { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
  .tx-info .meta { font-size: 0.75rem; color: var(--muted) }
  .tx-amount { font-weight: 700; font-size: 0.95rem; white-space: nowrap }
  .tx-amount.income { color: var(--green) }
  .tx-amount.expense { color: var(--red) }
  .tx-delete {
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: transparent; color: var(--muted);
    cursor: pointer; font-size: 1rem; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .tx-delete:hover { background: var(--red-bg); color: var(--red) }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 10px }

  /* Export bar */
  .export-bar {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 40px;
  }

  /* Footer */
  footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.75rem }

  @media (max-width: 640px) {
    .summary { grid-template-columns: 1fr }
    .form-grid { grid-template-columns: 1fr 1fr }
    .form-grid .btn { grid-column: span 2 }
    .container { padding: 12px }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Duit<span>Tracker</span></h1>
    <p>Catat & pantau keuangan bulanan kamu</p>
  </header>

  <div class="month-bar">
    <button onclick="changeMonth(-1)" title="Bulan sebelumnya">◀</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(1)" title="Bulan berikutnya">▶</button>
    <button onclick="goToday()" class="btn btn-outline" style="font-size:0.8rem;padding:6px 12px">Hari Ini</button>
  </div>

  <div class="summary">
    <div class="summary-card income">
      <div class="label">📥 Pendapatan</div>
      <div class="amount" id="totalIncome">Rp 0</div>
    </div>
    <div class="summary-card expense">
      <div class="label">📤 Pengeluaran</div>
      <div class="amount" id="totalExpense">Rp 0</div>
    </div>
    <div class="summary-card net" id="netCard">
      <div class="label">💰 Bersih</div>
      <div class="amount" id="totalNet">Rp 0</div>
    </div>
  </div>

  <div class="form-section">
    <h2>➕ Tambah Catatan</h2>
    <div class="form-grid">
      <select id="txType" onchange="onTypeChange()">
        <option value="income">💰 Pendapatan</option>
        <option value="expense">💸 Pengeluaran</option>
      </select>
      <input type="text" id="txDesc" placeholder="Deskripsi (contoh: Gaji, Makan siang)">
      <input type="number" id="txAmount" placeholder="Jumlah" min="0">
      <input type="date" id="txDate">
      <button class="btn btn-green" onclick="addTransaction()">Tambah</button>
    </div>
  </div>

  <div class="tx-section">
    <h2>📋 Riwayat Bulan Ini</h2>
    <div id="txList"></div>
  </div>

  <div class="export-bar">
    <button class="btn btn-outline" onclick="exportCSV()">📊 Export CSV</button>
    <button class="btn btn-outline" onclick="exportPDF()">📄 Export PDF</button>
    <button class="btn btn-red" onclick="clearMonth()">🗑 Hapus Semua</button>
  </div>

  <footer>Data disimpan otomatis di browser kamu • <span id="storageInfo"></span></footer>
</div>

<script>
// ── State ──
const STORAGE_KEY = 'duittracker_data';
let currentDate = new Date();
let data = loadData();

function getMonthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {} }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  updateStorageInfo();
}

function getTransactions(monthKey) {
  return data[monthKey] || [];
}

function setTransactions(monthKey, txs) {
  data[monthKey] = txs;
  saveData();
}

// ── Render ──
function formatRupiah(n) {
  const abs = Math.abs(n);
  const parts = abs.toLocaleString('id-ID');
  return n < 0 ? `-Rp ${parts}` : `Rp ${parts}`;
}

function render() {
  const mk = getMonthKey(currentDate);
  document.getElementById('monthLabel').textContent = currentDate.toLocaleDateString('id-ID', { month:'long', year:'numeric' });

  // Set date input to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('txDate').value = today;

  const txs = getTransactions(mk);
  let totalIncome = 0, totalExpense = 0;

  txs.forEach(t => {
    if (t.type === 'income') totalIncome += t.amount;
    else totalExpense += t.amount;
  });

  const net = totalIncome - totalExpense;
  document.getElementById('totalIncome').textContent = formatRupiah(totalIncome);
  document.getElementById('totalExpense').textContent = formatRupiah(totalExpense);
  document.getElementById('totalNet').textContent = formatRupiah(net);

  const netCard = document.getElementById('netCard');
  netCard.classList.remove('positive','negative');
  if (net > 0) netCard.classList.add('positive');
  if (net < 0) netCard.classList.add('negative');

  // Render list
  const list = document.getElementById('txList');
  if (txs.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Belum ada catatan bulan ini<br>Tambahkan pendapatan atau pengeluaran di atas</p></div>`;
  } else {
    // Sort by date desc, then by added order
    const sorted = [...txs].reverse();
    list.innerHTML = sorted.map((t, i) => {
      const realIdx = txs.indexOf(t);
      const icon = t.type === 'income' ? '📥' : '📤';
      const iconClass = t.type === 'income' ? 'income-icon' : 'expense-icon';
      const amtClass = t.type === 'income' ? 'income' : 'expense';
      const dateStr = new Date(t.date).toLocaleDateString('id-ID', { weekday:'short', day:'numeric', month:'short' });
      const catStr = t.category ? ` • ${t.category}` : '';
      return `
        <div class="tx-item">
          <div class="tx-icon ${iconClass}">${icon}</div>
          <div class="tx-info">
            <div class="desc">${escapeHtml(t.desc)}</div>
            <div class="meta">${dateStr}${catStr}</div>
          </div>
          <div class="tx-amount ${amtClass}">${t.type === 'expense' ? '-' : '+'}${formatRupiah(t.amount)}</div>
          <button class="tx-delete" onclick="deleteTx(${realIdx})" title="Hapus">✕</button>
        </div>`;
    }).join('');
  }

  updateStorageInfo();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateStorageInfo() {
  const used = new Blob([JSON.stringify(data)]).size;
  document.getElementById('storageInfo').textContent = `${(used/1024).toFixed(1)} KB terpakai`;
}

// ── Actions ──
function addTransaction() {
  const type = document.getElementById('txType').value;
  const desc = document.getElementById('txDesc').value.trim();
  const amount = parseInt(document.getElementById('txAmount').value);
  const dateVal = document.getElementById('txDate').value;

  if (!desc) return alert('Isi deskripsi dulu');
  if (!amount || amount <= 0) return alert('Jumlah harus lebih dari 0');

  const mk = getMonthKey(currentDate);
  const txs = getTransactions(mk);
  txs.push({ type, desc, amount, date: dateVal, created: Date.now() });
  setTransactions(mk, txs);

  // Clear form
  document.getElementById('txDesc').value = '';
  document.getElementById('txAmount').value = '';
  render();
}

function deleteTx(idx) {
  if (!confirm('Hapus catatan ini?')) return;
  const mk = getMonthKey(currentDate);
  const txs = getTransactions(mk);
  txs.splice(idx, 1);
  setTransactions(mk, txs);
  render();
}

function clearMonth() {
  const mk = getMonthKey(currentDate);
  const txs = getTransactions(mk);
  if (txs.length === 0) return;
  if (!confirm(`Hapus SEMUA ${txs.length} catatan bulan ini?`)) return;
  setTransactions(mk, []);
  render();
}

function changeMonth(delta) {
  currentDate.setMonth(currentDate.getMonth() + delta);
  currentDate = new Date(currentDate); // normalize
  render();
}

function goToday() {
  currentDate = new Date();
  render();
}

function onTypeChange() {
  // could add category selector for expenses in future
}

// ── Export CSV ──
function exportCSV() {
  const mk = getMonthKey(currentDate);
  const txs = getTransactions(mk);
  if (txs.length === 0) return alert('Tidak ada data untuk diexport');

  const monthName = currentDate.toLocaleDateString('id-ID', { month:'long', year:'numeric' });
  let csv = 'Tipe,Deskripsi,Jumlah,Tanggal\n';
  txs.forEach(t => {
    const typeLabel = t.type === 'income' ? 'Pendapatan' : 'Pengeluaran';
    csv += `${typeLabel},"${t.desc}",${t.amount},${t.date}\n`;
  });

  // Totals
  const totalIncome = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExpense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  csv += `\nTotal Pendapatan,,${totalIncome},\n`;
  csv += `Total Pengeluaran,,${totalExpense},\n`;
  csv += `Bersih,,${totalIncome - totalExpense},\n`;

  downloadFile(csv, `duittracker-${mk}.csv`, 'text/csv');
}

// ── Export PDF ──
function exportPDF() {
  const mk = getMonthKey(currentDate);
  const txs = getTransactions(mk);
  if (txs.length === 0) return alert('Tidak ada data untuk diexport');

  const monthName = currentDate.toLocaleDateString('id-ID', { month:'long', year:'numeric' });
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Header
  doc.setFillColor(10,10,15);
  doc.rect(0,0,210,30,'F');
  doc.setTextColor(34,197,94);
  doc.setFontSize(20);
  doc.setFont('helvetica','bold');
  doc.text('DuitTracker', 14, 20);
  doc.setTextColor(136,136,160);
  doc.setFontSize(10);
  doc.setFont('helvetica','normal');
  doc.text(`Laporan Keuangan — ${monthName}`, 14, 28);

  // Table
  const rows = txs.map(t => [
    t.type === 'income' ? 'Pendapatan' : 'Pengeluaran',
    t.desc,
    `Rp ${t.amount.toLocaleString('id-ID')}`,
    new Date(t.date).toLocaleDateString('id-ID')
  ]);

  doc.autoTable({
    startY: 36,
    head: [['Tipe','Deskripsi','Jumlah','Tanggal']],
    body: rows,
    styles: { fontSize: 9, cellPadding: 3 },
    headStyles: { fillColor: [34,197,94], textColor: [0,0,0], fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [26,26,37] },
  });

  // Summary
  const totalIncome = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExpense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const net = totalIncome - totalExpense;

  const finalY = doc.lastAutoTable.finalY + 10;
  doc.setFontSize(11);
  doc.setTextColor(34,197,94);
  doc.text(`Total Pendapatan: Rp ${totalIncome.toLocaleString('id-ID')}`, 14, finalY);
  doc.setTextColor(239,68,68);
  doc.text(`Total Pengeluaran: Rp ${totalExpense.toLocaleString('id-ID')}`, 14, finalY + 8);
  doc.setTextColor(net >= 0 ? 34 : 239, net >= 0 ? 197 : 68, net >= 0 ? 94 : 68);
  doc.setFont('helvetica','bold');
  doc.text(`Total Bersih: Rp ${net.toLocaleString('id-ID')}`, 14, finalY + 18);

  // Footer
  doc.setTextColor(136,136,160);
  doc.setFontSize(8);
  doc.setFont('helvetica','normal');
  doc.text(`Dibuat pada ${new Date().toLocaleDateString('id-ID')}`, 14, 285);

  doc.save(`duittracker-${mk}.pdf`);
}

function downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Init ──
render();
</script>
</body>
</html>
